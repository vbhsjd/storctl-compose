name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout storctl-compose
        uses: actions/checkout@v4
        with:
          path: storctl-compose

      - name: Checkout storctl
        uses: actions/checkout@v4
        with:
          repository: vbhsjd/storctl
          path: storctl

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check shell syntax
        working-directory: storctl-compose
        run: bash -n scripts/*.sh legacy/ansible/scripts/*.sh tests/sim/run.sh tests/sim/fakebin/*

      - name: Go test
        working-directory: storctl-compose
        run: go test ./...

      - name: Go vet
        working-directory: storctl-compose
        run: go vet ./...

      - name: Build binaries
        working-directory: storctl-compose
        run: |
          GOOS=linux GOARCH=arm64 go build -o dist/storctl-compose-linux-arm64 ./cmd/storctl-compose
          GOOS=linux GOARCH=amd64 go build -o dist/storctl-compose-linux-amd64 ./cmd/storctl-compose

      - name: Build target storctl
        working-directory: storctl
        run: |
          GOOS=linux GOARCH=arm64 go build -o dist/storctl-linux-arm64 ./cmd/storctl

      - name: Check package contents
        working-directory: storctl-compose
        run: |
          mkdir -p dist/pkg/examples
          cp dist/storctl-compose-linux-arm64 dist/pkg/storctl-compose
          cp ../storctl/dist/storctl-linux-arm64 dist/pkg/storctl-linux-arm64
          (cd dist/pkg && sha256sum storctl-compose > storctl-compose.sha256)
          (cd dist/pkg && sha256sum storctl-linux-arm64 > storctl-linux-arm64.sha256)
          cp examples/hosts.yaml dist/pkg/hosts.yaml.example
          cp examples/compose.yaml dist/pkg/compose.yaml
          cp examples/storctl-profiles.json dist/pkg/storctl-profiles.json
          cp examples/storctl-artifacts.example.json dist/pkg/storctl-artifacts.example.json
          cp README.md README.en.md CHANGELOG.md LICENSE dist/pkg/
          cp -R examples/. dist/pkg/examples/
          cp -R docs dist/pkg/docs
          test -f dist/pkg/storctl-compose
          test -f dist/pkg/storctl-compose.sha256
          test -f dist/pkg/storctl-linux-arm64
          test -f dist/pkg/storctl-linux-arm64.sha256
          test -f dist/pkg/hosts.yaml.example
          test -f dist/pkg/compose.yaml
          test -f dist/pkg/storctl-profiles.json
          test -f dist/pkg/storctl-artifacts.example.json
          test -f dist/pkg/README.md
          test -f dist/pkg/README.en.md
          test -f dist/pkg/CHANGELOG.md
          test -f dist/pkg/LICENSE
          test -f dist/pkg/examples/compose.yaml
          test -f dist/pkg/docs/tutorial.md

      - name: Simulation suite
        working-directory: storctl-compose
        env:
          STORCTL_SOURCE_DIR: ${{ github.workspace }}/storctl
        run: ./tests/sim/run.sh
