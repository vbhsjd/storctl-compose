name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: bash -n scripts/*.sh
      - name: Check example JSON
        run: python3 -m json.tool examples/storctl-profiles.json >/dev/null
